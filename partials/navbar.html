<!--
  partials/navbar.html — Students Hub topbar.
  Loaded by every authenticated page (NOT login / class-picker /
  waiting / shared which need a clean header).

  No dropdowns, no admin tooling — Students Hub deliberately keeps
  the chrome minimal because the audience is 12-18 year-old students
  on phones.
-->
<header class="topbar">
  <a href="/" class="topbar-brand">
    <span class="brand-mark">E</span>
    <span>Students Hub</span>
  </a>
  <nav class="topbar-nav" id="topbarNav">
    <a href="/" data-nav="dashboard">Dashboard</a>
    <a href="/tests" data-nav="tests">Tests</a>
    <a href="/practice" data-nav="practice">Practice</a>
    <a href="/daily-challenge" data-nav="daily-challenge">Daily</a>
    <a href="/growth" data-nav="growth">Growth</a>
    <a href="/leaderboard" data-nav="leaderboard">Leaderboard</a>
    <a href="/profile" data-nav="profile">Profile</a>
  </nav>
  <div class="topbar-user">
    <span class="points-chip" id="topbarPoints" style="display:none">
      <span class="icon">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M12 2l2.39 7.36H22l-6.18 4.5L18.21 21 12 16.5 5.79 21l2.39-7.14L2 9.36h7.61L12 2z"/></svg>
      </span>
      <span id="topbarPointsVal">0</span>
    </span>
    <a href="/avatar" class="topbar-avatar" id="topbarAvatar" title="Customize avatar">·</a>
  </div>
</header>
<script>
  // Highlight active nav link based on current path.
  (function () {
    const path = (window.location.pathname.replace(/\/$/, '') || '/');
    const map  = {
      '/': 'dashboard', '/tests': 'tests', '/growth': 'growth',
      '/leaderboard': 'leaderboard', '/profile': 'profile',
      '/practice': 'practice', '/daily-challenge': 'daily-challenge'
    };
    let activeKey = map[path] || null;
    if (!activeKey) {
      if (path.startsWith('/practice-run')) activeKey = 'practice';
      else if (path.startsWith('/test'))    activeKey = 'tests';
    }
    if (activeKey) {
      const link = document.querySelector('#topbarNav a[data-nav="' + activeKey + '"]');
      if (link) link.classList.add('active');
    }

    function paintAvatar() {
      const av = document.getElementById('topbarAvatar');
      if (!av) return;
      const p = window.studentProfile;
      const uid = window.currentUser && window.currentUser.uid;
      if (!p || !uid) return;
      const url = window.studentAvatarUrl ? window.studentAvatarUrl(uid, { size: 64 }) : '';
      if (url) {
        av.innerHTML = '<img src="' + url + '" alt="" loading="lazy">';
      } else {
        av.textContent = (p.displayName || p.email || '?').charAt(0).toUpperCase();
      }
    }

    // Best-effort points chip — fails silent if student_points doc absent.
    // Imports the modular SDK on demand because navbar runs in classic-script
    // context (no top-level import). Dynamic import() is supported on all
    // modern browsers (Chrome 63+, Safari 11.1+).
    async function paintPoints() {
      if (!window.db || !window.currentUser) return;
      try {
        const { doc, getDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        const snap = await getDoc(doc(window.db, 'student_points', window.currentUser.uid));
        if (!snap.exists()) return;
        const pts = snap.data().totalPoints || 0;
        const chip = document.getElementById('topbarPoints');
        const val  = document.getElementById('topbarPointsVal');
        if (val) val.textContent = pts.toLocaleString('en-GB');
        if (chip) chip.style.display = 'inline-flex';
      } catch (e) { /* silent — chip stays hidden */ }
    }

    function onReady() { paintAvatar(); paintPoints(); }
    if (window.studentProfile) onReady();
    else window.addEventListener('authReady', onReady);
  })();
</script>
