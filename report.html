<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test result — Students Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    .score-hero {
      background: linear-gradient(135deg, var(--mor) 0%, var(--cyan) 100%);
      color: #fff; border-radius: 16px;
      padding: 28px; margin-bottom: 18px;
      text-align: center;
    }
    .score-num {
      font-family: 'Lora', serif; font-size: 3.2rem; font-weight: 600;
      line-height: 1;
    }
    .score-sub { color: rgba(255,255,255,.85); font-size: .9rem; margin-top: 4px; }
    .score-pass { color: #d1fae5; font-size: 1.1rem; font-weight: 500; margin-top: 10px; }
    .score-fail { color: #fecaca; font-size: 1.1rem; font-weight: 500; margin-top: 10px; }

    .item-result {
      padding: 14px 16px; background: #fff;
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 8px;
    }
    .item-result.is-correct { border-left: 4px solid #16a34a; }
    .item-result.is-wrong   { border-left: 4px solid #dc2626; }
    .ir-stem { font-weight: 500; margin-bottom: 6px; }
    .ir-meta { font-size: 12px; color: var(--ink-3); margin-bottom: 8px; }
    .ir-explanation {
      font-size: 13px; color: var(--ink-2);
      background: var(--paper); padding: 10px 12px; border-radius: 8px;
      margin-top: 8px;
    }
    .share-box {
      margin-top: 24px; padding: 16px; background: var(--paper);
      border: 1px dashed var(--border); border-radius: 12px;
    }
    .share-link {
      width: 100%; padding: 8px 10px; font-family: monospace; font-size: 12px;
      border: 1px solid var(--border); border-radius: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body style="display:none">
  <!-- FIREBASE_ENV -->

  <div id="navbar-container"></div>

  <main class="page">
    <a href="/tests" style="font-size:.86rem">← Back to tests</a>

    <div id="loadState" class="empty" style="padding:50px 20px">Loading result…</div>
    <div id="errState"  class="empty" hidden></div>

    <div id="resultBody" hidden>
      <div class="score-hero">
        <div style="font-size:.78rem; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.7); margin-bottom:6px;" id="testTitle">—</div>
        <div class="score-num" id="scoreNum">—</div>
        <div class="score-sub" id="scoreSub">—</div>
        <div id="passLabel"></div>
      </div>

      <div class="card" style="margin-bottom:18px">
        <div class="card-head"><div class="card-title">Question by question</div></div>
        <div id="itemsList"></div>
      </div>

      <div class="card" id="shareCard" style="margin-bottom:18px">
        <div class="card-head"><div class="card-title">Share with a parent</div></div>
        <p style="color:var(--ink-3); font-size:.88rem; margin-bottom:12px">Generate a link your parent can open without signing in. The link expires in 30 days.</p>
        <button class="btn btn-secondary" id="shareBtn" type="button">Generate share link</button>
        <div id="shareResult" hidden style="margin-top:14px">
          <input id="shareLink" class="input" readonly style="font-family:monospace; font-size:.78rem;">
          <div style="margin-top:8px; display:flex; gap:8px;">
            <button class="btn btn-primary" id="copyBtn" type="button">Copy</button>
            <button class="btn btn-ghost" id="revokeBtn" type="button">Revoke</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import {
      doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, orderBy, Timestamp
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    fetch('/partials/navbar.html').then(r => r.text()).then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      document.querySelectorAll('#navbar-container script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });

    window.addEventListener('authReady', async (ev) => {
      if (!ev.detail.signedIn) return;
      const params = new URLSearchParams(window.location.search);
      const attemptId = params.get('attemptId');
      if (!attemptId) return showErr('No test specified');

      try {
        const aSnap = await getDoc(doc(window.db, 'chapter_test_attempts', attemptId));
        if (!aSnap.exists()) return showErr('Result not found');
        const a = aSnap.data();
        if (a.studentUid !== window.currentUser.uid) return showErr('Not your result');
        if (a.status !== 'submitted' && a.status !== 'scored' && a.status !== 'flagged') {
          return showErr('Test not submitted yet');
        }

        // Fetch items so we can show stems (rules allow active students to read)
        const items = (await getDocs(query(
          collection(window.db, 'chapter_tests', a.testId, 'items'),
          orderBy('seq', 'asc')
        ))).docs.map(d => ({ id: d.id, ...d.data() }));

        document.getElementById('testTitle').textContent = (a.testTitle || a.testId) + ' · Submitted ' + formatTs(a.submittedAt);
        const score = typeof a.rawScorePct === 'number' ? a.rawScorePct : 0;
        document.getElementById('scoreNum').textContent = score + '%';
        document.getElementById('scoreSub').textContent = `${a.earnedMarks || 0} of ${a.totalMarks || 0} marks`;
        const passEl = document.getElementById('passLabel');
        if (a.passed === true)  passEl.outerHTML = '<div class="score-pass">✓ Mastered</div>';
        else if (a.passed === false) passEl.outerHTML = '<div class="score-fail">Keep practising — ask your teacher to help</div>';

        const responsesByItem = {};
        (a.responses || []).forEach(r => { responsesByItem[r.itemId] = r; });

        const list = document.getElementById('itemsList');
        list.innerHTML = items.map((it, i) => {
          const r = responsesByItem[it.id];
          const correct = r && r.isCorrect;
          let userAnswer = '(no answer)';
          if (r) {
            if (it.type === 'mcq') userAnswer = (it.options || [])[Number(r.answer)] || `(option ${r.answer})`;
            else userAnswer = String(r.answer || '');
          }
          let correctAnswer = '';
          if (it.type === 'mcq') correctAnswer = (it.options || [])[Number(it.correctIdx)] || '';
          else correctAnswer = it.correctAnswer || '';
          return `
            <div class="item-result ${correct ? 'is-correct' : 'is-wrong'}">
              <div class="ir-stem">Q${i+1}. ${escHtml(it.stem)}</div>
              <div class="ir-meta">
                Your answer: <strong>${escHtml(userAnswer)}</strong>
                ${correct ? '· ✓ Correct' : '· ✗ Correct answer: <strong>' + escHtml(correctAnswer) + '</strong>'}
              </div>
              ${it.explanation ? `<div class="ir-explanation">${escHtml(it.explanation)}</div>` : ''}
            </div>
          `;
        }).join('');

        document.getElementById('loadState').hidden = true;
        document.getElementById('resultBody').hidden = false;
      } catch (e) {
        showErr('Could not load result: ' + (e.message || e.code));
      }
    });

    function showErr(msg) {
      document.getElementById('loadState').hidden = true;
      const el = document.getElementById('errState');
      el.hidden = false;
      el.innerHTML = `<div class="empty-title">${escHtml(msg)}</div>`;
    }

    // Parent share — generates a parent_share_tokens doc keyed by a
    // random URL-safe string. Doc is gettable by anyone who knows the
    // token; rule blocks list. Default 30-day expiry. Student can revoke
    // by deleting (rule allows owner-delete).
    let currentShareToken = null;
    document.getElementById('shareBtn').addEventListener('click', generateShare);
    document.getElementById('copyBtn').addEventListener('click', () => {
      const inp = document.getElementById('shareLink');
      inp.select();
      document.execCommand('copy');
      inp.blur();
    });
    document.getElementById('revokeBtn').addEventListener('click', revokeShare);

    async function generateShare() {
      const params = new URLSearchParams(window.location.search);
      const attemptId = params.get('attemptId');
      if (!attemptId) return;
      const token = randomToken();
      try {
        const expiresAt = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);
        await setDoc(doc(window.db, 'parent_share_tokens', token), {
          studentUid: window.currentUser.uid,
          attemptId,
          expiresAt: Timestamp.fromDate(expiresAt),
          createdAt: Timestamp.fromDate(new Date()),
        });
        currentShareToken = token;
        const url = window.location.origin + '/shared?token=' + token;
        document.getElementById('shareLink').value = url;
        document.getElementById('shareResult').hidden = false;
        document.getElementById('shareBtn').hidden = true;
      } catch (e) {
        alert('Could not create share link: ' + (e.message || e.code));
      }
    }
    async function revokeShare() {
      if (!currentShareToken) return;
      try {
        await deleteDoc(doc(window.db, 'parent_share_tokens', currentShareToken));
        currentShareToken = null;
        document.getElementById('shareResult').hidden = true;
        document.getElementById('shareBtn').hidden = false;
      } catch (e) {
        alert('Revoke failed: ' + (e.message || e.code));
      }
    }
    function randomToken() {
      const arr = new Uint8Array(24);
      crypto.getRandomValues(arr);
      return Array.from(arr).map(b => b.toString(36).padStart(2, '0')).join('').slice(0, 32);
    }

    function formatTs(ts) {
      if (!ts || !ts.toDate) return '';
      return ts.toDate().toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    function escHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      })[c]);
    }
  </script>
</body>
</html>
