<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Handbook — Students Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%236c5ce7'/><text x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>E</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    /* Handbook hero — blue accent matches the 'school-facing' kind across all hubs. */
    .hb-hero {
      background: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
      color: #fff;
      padding: 24px 28px;
      border-radius: var(--radius-xl);
      box-shadow: 0 10px 28px -14px rgba(14, 165, 233, .45);
      margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .hb-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 88% 18%, rgba(255,255,255,.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .hb-hero .eyebrow {
      font-size: .82rem; opacity: .9; letter-spacing: .04em;
      text-transform: uppercase; font-weight: 500;
    }
    .hb-hero h1 {
      margin: 4px 0 6px;
      font-family: 'Lora', serif; font-size: 1.8rem; line-height: 1.2;
    }
    .hb-hero p { margin: 0; opacity: .95; max-width: 640px; line-height: 1.55; }
    .hb-hero-meta {
      margin-top: 16px;
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: .82rem;
    }
    .hb-hero-meta .pill {
      background: rgba(255,255,255,.18); padding: 4px 12px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,.22);
    }

    /* Sections list — each section is a collapsible accordion that scrolls
       smoothly when picked from the TOC. */
    .hb-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      box-shadow: inset 4px 0 0 #0ea5e9;
      overflow: hidden;
    }
    .hb-section summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'Lora', serif; font-weight: 700;
      font-size: 1.1rem; color: var(--ink);
    }
    .hb-section summary::-webkit-details-marker { display: none; }
    .hb-section summary .caret {
      width: 16px; height: 16px; display: inline-block;
      transition: transform .15s;
      color: #0ea5e9; flex-shrink: 0;
    }
    .hb-section[open] summary .caret { transform: rotate(90deg); }
    .hb-section summary .num {
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem; color: var(--ink-3);
      background: #e0f2fe; border-radius: 6px;
      padding: 2px 8px; font-weight: 600;
    }
    .hb-section summary .summary-text {
      flex: 1; margin-left: 4px;
    }
    .hb-section-body-wrap {
      padding: 0 20px 18px 20px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .hb-section-summary {
      padding: 12px 0 6px;
      font-size: .9rem; color: var(--ink-3); font-style: italic;
      line-height: 1.5;
    }
    .hb-section-slot-guide {
      padding: 10px 14px;
      background: #fef3c7; border: 1px solid #fde68a;
      border-radius: 8px;
      font-size: .88rem; color: #78350f; line-height: 1.55;
      margin: 10px 0;
    }
    .hb-section-slot-guide strong { color: #78350f; }

    /* Body markup */
    .hb-body { font-size: 15px; line-height: 1.7; color: var(--ink); padding-top: 6px; }
    .hb-body p { margin: 0 0 12px; }
    .hb-body h3 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.1rem; font-weight: 600; color: var(--ink);
      margin: 18px 0 8px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .hb-body h4 {
      font-size: .96rem; font-weight: 600; color: var(--ink);
      margin: 14px 0 6px;
    }
    .hb-body ul, .hb-body ol { margin: 6px 0 14px; padding-left: 22px; }
    .hb-body li { margin-bottom: 4px; }
    .hb-body blockquote {
      margin: 12px 0; padding: 10px 14px;
      background: #f9fafb; border-left: 3px solid #0ea5e9;
      color: var(--ink-2); font-style: italic;
    }
    .hb-body hr { border: 0; height: 1px; background: var(--border); margin: 20px 0; }
    .hb-body strong { color: var(--ink); font-weight: 700; }
    .hb-body em { color: var(--ink-2); }

    /* Callout boxes */
    .hb-callout {
      margin: 12px 0;
      padding: 12px 14px;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .88rem;
    }
    .hb-callout-label {
      font-weight: 600; font-size: .86rem; color: var(--ink);
      margin-bottom: 6px;
    }
    .hb-callout ul, .hb-callout ol { margin: 0; padding-left: 20px; }
    .hb-callout li { margin-bottom: 3px; }
    .hb-callout-slot { background: #fef3c7; border-color: #fde68a; }
    .hb-callout-slot .hb-callout-label { color: #78350f; }
    .hb-callout-ref { background: #ecfeff; border-color: #a5f3fc; }
    .hb-callout-ref .hb-callout-label { color: #155e75; }
    .hb-callout-quickref { background: #f5f3ff; border-color: #ddd6fe; }
    .hb-callout-quickref .hb-callout-label { color: #5b21b6; }
    .hb-callout-violated { background: #fef2f2; border-color: #fecaca; }
    .hb-callout-violated .hb-callout-label { color: #991b1b; }

    /* TOC strip + expand-all button */
    .hb-actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .hb-action-btn {
      background: #fff; border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 999px;
      font-size: .85rem; color: var(--ink-2);
      cursor: pointer; font-family: inherit;
      transition: background .15s, border-color .15s;
    }
    .hb-action-btn:hover { background: #f9fafb; border-color: #cbd5e1; }
    .hb-action-btn.is-active { background: #e0f2fe; border-color: #7dd3fc; color: #075985; }

    .hb-loading {
      text-align: center; padding: 32px; color: var(--ink-3); font-size: .9rem;
    }
    .hb-error {
      text-align: center; padding: 32px; color: #991b1b;
      background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius-lg);
    }
  </style>
</head>
<body style="display:none">
  <!-- FIREBASE_ENV -->
  <div id="navbar-container"></div>

  <main class="container">
    <div class="hb-hero">
      <div class="eyebrow" id="hbEyebrow">Student Handbook</div>
      <h1 id="hbTitle">Loading…</h1>
      <p id="hbSubtitle"></p>
      <div class="hb-hero-meta" id="hbMeta"></div>
    </div>

    <div class="hb-actions">
      <button class="hb-action-btn" id="btnExpandAll" type="button">Open all sections</button>
      <button class="hb-action-btn" id="btnCollapseAll" type="button">Close all sections</button>
      <button class="hb-action-btn" id="btnPrint" type="button">Print</button>
    </div>

    <div id="hbContent" class="hb-loading">Loading your handbook…</div>
  </main>

  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    fetch('/partials/navbar.html').then(r => r.text()).then(html => {
      const c = document.getElementById('navbar-container');
      if (c) {
        c.innerHTML = html;
        c.querySelectorAll('script').forEach(old => {
          const s = document.createElement('script');
          s.textContent = old.textContent;
          old.replaceWith(s);
        });
      }
    });

    // -- Markdown-lite renderer (mirrors CH renderBodyMarkdown) -----------
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      }[c]));
    }
    function inlineMd(s) {
      return s
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, '$1<em>$2</em>');
    }
    function renderBodyMarkdown(text) {
      if (!text) return '';
      const escaped = escapeHtml(text);
      const paragraphs = escaped.split(/\n\s*\n/);
      return paragraphs.map(p => {
        const t = p.trim();
        if (!t) return '';
        if (/^###\s+/.test(t)) return `<h4>${inlineMd(t.replace(/^###\s+/, ''))}</h4>`;
        if (/^##\s+/.test(t))  return `<h3>${inlineMd(t.replace(/^##\s+/, ''))}</h3>`;
        if (/^---+$/.test(t))  return `<hr>`;
        if (/^&gt;\s+/.test(t)) {
          const q = t.split('\n').map(l => l.replace(/^&gt;\s?/, '')).join(' ');
          return `<blockquote>${inlineMd(q)}</blockquote>`;
        }
        // bullets
        if (/^[-•*]\s+/m.test(t) && t.split('\n').every(l => /^[-•*]\s+/.test(l) || l.trim() === '')) {
          const items = t.split('\n').filter(Boolean).map(l => `<li>${inlineMd(l.replace(/^[-•*]\s+/, ''))}</li>`).join('');
          return `<ul>${items}</ul>`;
        }
        // numbered
        if (/^\d+\.\s+/.test(t) && t.split('\n').every(l => /^\d+\.\s+/.test(l) || l.trim() === '')) {
          const items = t.split('\n').filter(Boolean).map(l => `<li>${inlineMd(l.replace(/^\d+\.\s+/, ''))}</li>`).join('');
          return `<ol>${items}</ol>`;
        }
        return `<p>${inlineMd(t.replace(/\n/g, '<br>'))}</p>`;
      }).join('');
    }

    function renderCallout(c) {
      if (!c || !c.type) return '';
      const items = Array.isArray(c.items) ? c.items : [];
      const itemsHtml = items.map(x => `<li>${escapeHtml(x)}</li>`).join('');
      const label = escapeHtml(c.label || '');
      const tag = c.type === 'quick_ref_card' ? 'ol' : 'ul';
      const cls = ({
        school_slot_inline: 'hb-callout-slot',
        side_reference:     'hb-callout-ref',
        quick_ref_card:     'hb-callout-quickref',
        if_violated:        'hb-callout-violated',
      })[c.type] || '';
      const icon = ({
        school_slot_inline: '📋',
        side_reference:     '📖',
        quick_ref_card:     '⚡',
        if_violated:        '🚨',
      })[c.type] || '';
      return `<div class="hb-callout ${cls}">
        ${label ? `<div class="hb-callout-label">${icon} ${label}</div>` : ''}
        <${tag}>${itemsHtml}</${tag}>
      </div>`;
    }

    function renderSection(section, index) {
      const num = String(section.order || (index + 1)).padStart(2, '0');
      const title = section.title || section.sectionId || `Section ${index + 1}`;
      const isSlot = section.schoolSlot === true;
      const guidance = (isSlot && section.schoolSlotGuidance)
        ? `<div class="hb-section-slot-guide"><strong>Your school fills this in.</strong> ${escapeHtml(section.schoolSlotGuidance)}</div>`
        : '';
      const summary = section.summary
        ? `<div class="hb-section-summary">${escapeHtml(section.summary)}</div>`
        : '';
      const body = section.body ? renderBodyMarkdown(section.body) : '';
      const callouts = Array.isArray(section.callouts)
        ? section.callouts.map(renderCallout).join('')
        : '';

      return `<details class="hb-section" data-section-index="${index}" ${index === 0 ? 'open' : ''}>
        <summary>
          <svg class="caret" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 3 11 8 5 13"></polyline>
          </svg>
          <span class="num">${num}</span>
          <span class="summary-text">${escapeHtml(title)}</span>
        </summary>
        <div class="hb-section-body-wrap">
          ${summary}
          ${guidance}
          <div class="hb-body">${body}</div>
          ${callouts}
        </div>
      </details>`;
    }

    function renderHandbook(hb) {
      // Hero
      document.getElementById('hbEyebrow').textContent =
        `Eduversal School-Facing Handbook · v${hb.version || '?'}`;
      document.getElementById('hbTitle').textContent = hb.title || 'Student Handbook';
      document.getElementById('hbSubtitle').textContent = hb.subtitle || '';

      const meta = document.getElementById('hbMeta');
      const pills = [];
      const sections = Array.isArray(hb.sections) ? hb.sections : [];
      pills.push(`<span class="pill">${sections.length} sections</span>`);
      if (hb.publishedOn) pills.push(`<span class="pill">Published ${hb.publishedOn}</span>`);
      if (hb.language) pills.push(`<span class="pill">Language: ${escapeHtml(hb.language)}</span>`);
      meta.innerHTML = pills.join('');

      // Sections
      const content = document.getElementById('hbContent');
      if (!sections.length) {
        content.className = 'hb-error';
        content.innerHTML = 'This handbook has no sections to display.';
        return;
      }
      content.className = '';
      content.innerHTML = sections.map(renderSection).join('');

      // Action buttons
      document.getElementById('btnExpandAll').addEventListener('click', () => {
        document.querySelectorAll('.hb-section').forEach(d => d.open = true);
      });
      document.getElementById('btnCollapseAll').addEventListener('click', () => {
        document.querySelectorAll('.hb-section').forEach(d => d.open = false);
      });
      document.getElementById('btnPrint').addEventListener('click', () => {
        document.querySelectorAll('.hb-section').forEach(d => d.open = true);
        setTimeout(() => window.print(), 250);
      });
    }

    // Fixed handbookId for Students Hub — students only ever see the
    // Student Handbook here. Other school-facing handbooks (teacher /
    // parent / staff CoC) live in their respective hubs.
    const STUDENT_HANDBOOK_ID = 'eduversal_student_handbook_v1';

    window.addEventListener('authReady', async (ev) => {
      if (!ev || !ev.detail || !ev.detail.signedIn) return;
      try {
        const snap = await getDoc(doc(window.db, 'induction_programs', STUDENT_HANDBOOK_ID));
        if (!snap.exists()) {
          const content = document.getElementById('hbContent');
          content.className = 'hb-error';
          content.innerHTML = 'The Student Handbook is not available yet. Please ask your teacher or contact the school.';
          return;
        }
        renderHandbook({ id: snap.id, ...snap.data() });
      } catch (err) {
        console.error('Failed to load Student Handbook:', err);
        const content = document.getElementById('hbContent');
        content.className = 'hb-error';
        content.innerHTML = 'Sorry, we could not load the handbook right now. Please try again later.';
      }
    });
  </script>
</body>
</html>
