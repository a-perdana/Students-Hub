<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Students Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    .profile-hero {
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 18px;
    }
    .profile-avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--stage-primary-2);
      border: 3px solid var(--white);
      box-shadow: 0 8px 24px -10px rgba(108,92,231,.45), 0 0 0 1px var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; display: block; }
    .profile-hero-meta h1 { margin: 0; font-size: 1.5rem; }
    .profile-hero-meta p  { margin: 4px 0 0; color: var(--ink-3); font-size: .9rem; }
    .profile-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .profile-row:last-child { border: none; }
    .profile-row-label { width: 120px; color: var(--ink-3); font-size: .86rem; }
    .profile-row-value { flex: 1; font-weight: 500; }
    .lock-note { font-size: .78rem; color: var(--ink-3); margin-top: 4px; }
    .avatar-note { font-size: .78rem; color: var(--ink-3); margin: 6px 0 0; }
  </style>
</head>
<body style="display:none">
  <!-- FIREBASE_ENV -->

  <div id="navbar-container"></div>

  <main class="page-narrow">
    <section class="profile-hero">
      <div class="profile-avatar" id="profileAvatar"></div>
      <div class="profile-hero-meta">
        <h1 id="profileHeroName">Profile</h1>
        <p id="profileHeroSub">Your Eduversal account</p>
      </div>
    </section>

    <div class="card">
      <div class="profile-row">
        <div class="profile-row-label">Name</div>
        <div class="profile-row-value" id="pName">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-row-label">Email</div>
        <div class="profile-row-value" id="pEmail">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-row-label">School</div>
        <div class="profile-row-value" id="pSchool">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-row-label">Class</div>
        <div class="profile-row-value" id="pClass">—</div>
      </div>
      <div class="profile-row">
        <div class="profile-row-label">Grade</div>
        <div class="profile-row-value" id="pGrade">—</div>
      </div>
    </div>
    <p class="lock-note">School, class, grade, and email are managed by your teacher and can't be edited here. If something is wrong, ask your teacher to fix it.</p>

    <div style="margin-top:24px; display:flex; gap:12px; flex-wrap:wrap">
      <a href="/avatar" class="btn btn-primary">🎨 Customize avatar</a>
      <button class="btn btn-secondary" id="signOutBtn" type="button">Sign out</button>
    </div>
  </main>

  <script type="module" src="auth-guard.js"></script>
  <script>
    fetch('/partials/navbar.html').then(r => r.text()).then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      document.querySelectorAll('#navbar-container script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });

    window.addEventListener('authReady', (ev) => {
      if (!ev.detail.signedIn) return;
      const p = window.studentProfile;
      document.getElementById('pName').textContent   = p.displayName || '—';
      document.getElementById('pEmail').textContent  = p.email || '—';
      document.getElementById('pSchool').textContent = p.school || '—';
      document.getElementById('pClass').textContent  = p.className || '—';
      document.getElementById('pGrade').textContent  = p.gradeLevel ? ('Grade ' + p.gradeLevel) : '—';

      const first = (p.displayName || '').split(' ')[0] || 'there';
      document.getElementById('profileHeroName').textContent = first;
      document.getElementById('profileHeroSub').textContent  =
        [p.className, p.gradeLevel ? 'Grade ' + p.gradeLevel : null].filter(Boolean).join(' · ')
        || 'Your Eduversal account';

      const av = document.getElementById('profileAvatar');
      const url = window.studentAvatarUrl
        ? window.studentAvatarUrl(window.currentUser.uid, { size: 192 })
        : '';
      if (url) av.innerHTML = '<img src="' + url + '" alt="" loading="lazy">';
    });
    document.getElementById('signOutBtn').addEventListener('click', () => window.signOutStudent());
  </script>
</body>
</html>
