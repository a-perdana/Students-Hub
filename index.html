<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Students Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%236c5ce7'/><text x='50' y='66' font-size='52' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>E</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
  <style>
    .hello-banner {
      background: linear-gradient(135deg, var(--mor) 0%, var(--cyan) 100%);
      color: #fff;
      border-radius: 16px;
      padding: 28px 28px 24px;
      margin-bottom: 24px;
    }
    .hello-banner h1 {
      color: #fff; font-size: 1.6rem; margin-bottom: 4px;
    }
    .hello-banner p { color: rgba(255,255,255,.85); font-size: .94rem; }
    .grid-2 { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    .test-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none; color: inherit;
    }
    .test-row:last-child { border-bottom: none; }
    .test-row:hover { background: var(--paper); margin: 0 -12px; padding: 12px; border-radius: 8px; text-decoration: none; }
    .test-row-info { flex: 1; min-width: 0; }
    .test-row-title { font-weight: 500; color: var(--ink); }
    .test-row-meta  { font-size: .82rem; color: var(--ink-3); margin-top: 2px; }
    .test-row-cta {
      padding: 6px 14px; border-radius: 8px; font-size: .84rem; font-weight: 600;
      background: var(--mor); color: #fff;
    }
    .test-row-score {
      padding: 4px 10px; border-radius: 99px;
      font-size: .82rem; font-weight: 600;
    }
    .test-row-score.pass { background: var(--ok-bg); color: var(--ok); }
    .test-row-score.fail { background: var(--danger-bg); color: var(--danger); }
  </style>
</head>
<body style="display:none">
  <!-- FIREBASE_ENV -->

  <div id="navbar-container"></div>

  <main class="page">
    <section class="hello-banner">
      <h1 id="helloName">Welcome back</h1>
      <p id="helloMeta">Loading your class…</p>
    </section>

    <section class="grid-2">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Tests available now</div>
        </div>
        <div id="upcomingList">
          <div class="empty" style="padding:18px 0">Loading…</div>
        </div>
      </div>

      <div class="card">
        <div class="card-head">
          <div class="card-title">Recent results</div>
          <a href="/tests" class="card-sub">View all →</a>
        </div>
        <div id="recentList">
          <div class="empty" style="padding:18px 0">Loading…</div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:16px">
      <div class="card-head">
        <div class="card-title">Your growth journey</div>
        <a href="/growth" class="card-sub">See chart →</a>
      </div>
      <div id="growthSummary" class="empty" style="padding:18px 0">
        EASE growth assessments will start in the Fall window. Stay tuned!
      </div>
    </section>
  </main>

  <script type="module" src="auth-guard.js"></script>
  <script type="module">
    import {
      collection, query, where, onSnapshot, orderBy, limit
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    fetch('/partials/navbar.html').then(r => r.text()).then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      document.querySelectorAll('#navbar-container script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });

    window.addEventListener('authReady', (ev) => {
      if (!ev.detail.signedIn) return;
      const p = window.studentProfile;
      const first = (p.displayName || '').split(' ')[0] || '';
      document.getElementById('helloName').textContent = 'Hi ' + (first || 'there') + ' 👋';
      document.getElementById('helloMeta').textContent =
        [p.school, p.className, p.gradeLevel ? 'Grade ' + p.gradeLevel : null]
          .filter(Boolean).join(' · ');

      subscribeAttempts(window.currentUser.uid);
    });

    function subscribeAttempts(uid) {
      const q = query(
        collection(window.db, 'chapter_test_attempts'),
        where('studentUid', '==', uid),
        orderBy('opensAt', 'desc'),
        limit(20)
      );
      onSnapshot(q, snap => {
        const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const now = Date.now();
        const upcoming = all.filter(a => {
          if (a.status === 'submitted' || a.status === 'scored' || a.status === 'flagged' || a.status === 'cancelled') return false;
          const opens = a.opensAt && a.opensAt.toDate ? a.opensAt.toDate().getTime() : 0;
          const closes = a.closesAt && a.closesAt.toDate ? a.closesAt.toDate().getTime() : Infinity;
          return now >= opens && now <= closes;
        });
        const recent = all.filter(a => a.status === 'scored' || a.status === 'flagged' || a.status === 'submitted').slice(0, 5);
        renderUpcoming(upcoming);
        renderRecent(recent);
      }, err => {
        document.getElementById('upcomingList').innerHTML = '<div class="empty" style="padding:18px 0">Could not load tests: ' + escHtml(err.message || err.code) + '</div>';
      });
    }

    function renderUpcoming(list) {
      const box = document.getElementById('upcomingList');
      if (list.length === 0) {
        box.innerHTML = '<div class="empty" style="padding:18px 0">No tests available right now.</div>';
        return;
      }
      box.innerHTML = list.map(a => `
        <a href="/test?attemptId=${escAttr(a.id)}" class="test-row">
          <div class="test-row-info">
            <div class="test-row-title">${escHtml(a.testTitle || a.testId)}</div>
            <div class="test-row-meta">Closes ${formatTs(a.closesAt)}</div>
          </div>
          <span class="test-row-cta">${a.status === 'in_progress' ? 'Continue' : 'Start'}</span>
        </a>
      `).join('');
    }

    function renderRecent(list) {
      const box = document.getElementById('recentList');
      if (list.length === 0) {
        box.innerHTML = '<div class="empty" style="padding:18px 0">No results yet.</div>';
        return;
      }
      box.innerHTML = list.map(a => {
        const score = typeof a.rawScorePct === 'number' ? a.rawScorePct + '%' : '—';
        const passClass = a.passed === true ? 'pass' : a.passed === false ? 'fail' : '';
        return `
          <a href="/report?attemptId=${escAttr(a.id)}" class="test-row">
            <div class="test-row-info">
              <div class="test-row-title">${escHtml(a.testTitle || a.testId)}</div>
              <div class="test-row-meta">${formatTs(a.submittedAt || a.opensAt)}</div>
            </div>
            <span class="test-row-score ${passClass}">${score}</span>
          </a>
        `;
      }).join('');
    }

    function formatTs(ts) {
      if (!ts || !ts.toDate) return '';
      return ts.toDate().toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    function escHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      })[c]);
    }
    function escAttr(s) { return escHtml(s); }
  </script>
</body>
</html>
