<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth — Eduversal Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Lora:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="base.css">
</head>
<body style="display:none">
  <!-- FIREBASE_ENV -->

  <div id="navbar-container"></div>

  <main class="page">
    <h1>Your growth journey</h1>
    <p style="color:var(--ink-3); margin-bottom:18px">EASE growth measures how much you're learning over time, in Math, English, and Science.</p>

    <div class="card">
      <div class="empty">
        <div class="empty-title">No growth data yet</div>
        Take your first EASE assessment to start your growth chart.
      </div>
    </div>
  </main>

  <script type="module" src="auth-guard.js"></script>
  <script>
    fetch('/partials/navbar.html').then(r => r.text()).then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      document.querySelectorAll('#navbar-container script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.replaceWith(s);
      });
    });
  </script>
</body>
</html>
